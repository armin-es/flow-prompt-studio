# Local Postgres 16 with pgvector (Stage B). Start: `docker compose up -d`
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: flow
      POSTGRES_PASSWORD: flow
      POSTGRES_DB: flow_prompt
    ports:
      - '5433:5432'
    volumes:
      - flow_prompt_pgdata:/var/lib/postgresql/data

volumes:
  flow_prompt_pgdata:
