# Render Blueprint — Hono API only. Pair with a Vite static deploy (e.g. Vercel); see DEPLOY.md.
# Dashboard: New → Blueprint → pick repo → path to this file (repo root if flow-prompt-studio is the repo root).

services:
  - type: web
    name: flow-prompt-studio-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Required for browser UI on another origin (e.g. https://*.vercel.app)
      - key: CORS_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        sync: false
      # Optional Stage B
      - key: DATABASE_URL
        sync: false
